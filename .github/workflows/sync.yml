name: Sync Epics to Jira

on:
  push:
    branches:
      - main
    paths:
      - 'jira-tasks/epic-breakdown.md' # Theo dõi chính xác file này

jobs:
  sync-to-jira:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests pyyaml

      - name: Run Sync Script
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: python sync_epics_and_stories.py

      - name: Commit & Push updated Markdown
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add jira-tasks/epic-breakdown.md
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: cập nhật Jira Epic keys vào Markdown [skip ci]"
            git push
          else
            echo "Không phát hiện Epic mới nào được tạo, bỏ qua bước commit."
          fi
